<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora CVP — 12.º Dígito</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .card { background: #fff; border-radius: 14px; border: 1px solid #e0dfd8; padding: 2rem; width: 100%; max-width: 480px; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; color: #1a1a18; }
    .sub { font-size: 13px; color: #7a7a76; margin-bottom: 1.5rem; }
    label { font-size: 13px; color: #7a7a76; display: block; margin-bottom: 6px; }
    input[type=text] { width: 100%; font-size: 22px; letter-spacing: 4px; font-family: 'Courier New', monospace; padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc; background: #fafaf8; color: #1a1a18; outline: none; transition: border 0.15s; }
    input[type=text]:focus { border-color: #888; }
    .erro { font-size: 13px; color: #c0392b; margin-top: 8px; min-height: 20px; }
    .resultado { margin-top: 1.5rem; display: none; }
    .label-r { font-size: 13px; color: #7a7a76; margin-bottom: 4px; }
    .digito-row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 1rem; }
    .digito { font-size: 56px; font-weight: 500; font-family: 'Courier New', monospace; color: #1a1a18; line-height: 1; }
    .cvp-completo { font-size: 15px; font-family: 'Courier New', monospace; color: #7a7a76; }
    .detalhe { background: #f5f5f3; border-radius: 8px; padding: 12px 14px; font-size: 12px; font-family: 'Courier New', monospace; color: #5a5a58; line-height: 1.9; }
    .detalhe strong { color: #1a1a18; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Calculadora CVP</h1>
    <p class="sub">12.º dígito pelo algoritmo Luhn</p>
    <label for="cvp-input">Primeiros 11 dígitos do CVP</label>
    <input type="text" id="cvp-input" maxlength="11" placeholder="10193371869" oninput="calcular()" autocomplete="off" />
    <div class="erro" id="erro"></div>
    <div class="resultado" id="resultado">
      <p class="label-r">12.º dígito</p>
      <div class="digito-row">
        <span class="digito" id="digito"></span>
        <span class="cvp-completo" id="cvp-completo"></span>
      </div>
      <div class="detalhe" id="detalhe"></div>
    </div>
  </div>
  <script>
    function calcular() {
      const raw = document.getElementById('cvp-input').value.replace(/\D/g,'');
      document.getElementById('cvp-input').value = raw;
      const erro = document.getElementById('erro');
      const resultado = document.getElementById('resultado');
      if (raw.length === 0) { erro.textContent=''; resultado.style.display='none'; return; }
      if (raw.length < 11) { erro.textContent='Faltam ' + (11 - raw.length) + ' dígito(s).'; resultado.style.display='none'; return; }
      erro.textContent = '';
      const pesos = [2,1,2,1,2,1,2,1,2,1,2];
      let soma = 0, partes = [];
      for (let i = 0; i < 11; i++) {
        const d = parseInt(raw[i]);
        const v = d * pesos[i];
        soma += v;
        partes.push(d + '×' + pesos[i] + '=' + v);
      }
      const digito = (10 - (soma % 10)) % 10;
      document.getElementById('digito').textContent = digito;
      document.getElementById('cvp-completo').textContent = raw + digito;
      document.getElementById('detalhe').innerHTML =
        partes.join(' + ') +
        '<br>Soma = ' + soma +
        ' → mod 10 = ' + (soma % 10) +
        ' → 10 − ' + (soma % 10) +
        ' = <strong>' + digito + '</strong>';
      resultado.style.display = 'block';
    }
  </script>
</body>
</html>
